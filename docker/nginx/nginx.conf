##############################################################################
# nginx.conf — Gateway Revere Proxy (Landing Page & Future Apps)
#
# FASE 1 (inicial): Só HTTP — necessário para o Certbot gerar o certificado.
#
# Depois que o certbot rodar com sucesso e o certificado existir,
# comente o bloco "FASE 1" e descomente o bloco "FASE 2" abaixo,
# depois rode: docker compose exec nginx nginx -s reload
##############################################################################

# ─── FASE 1: Apenas HTTP + desafio do Certbot ────────────────────────────────
server {
    listen 80;
    server_name grupo20mais.com.br www.grupo20mais.com.br odoo.grupo20mais.com.br;

    # Desafio do Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Bloqueio de rotas administrativas
    location ~ ^/(login|register|dashboard) {
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;

        proxy_pass         http://grupo20mais.com.br:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Enquanto não tem SSL, deixa o site acessível via HTTP
    location / {
        # O Nginx vai buscar o container com o nome "grupo20mais.com.br" na porta interna 80 (Apache)
        proxy_pass         http://grupo20mais.com.br:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

